<!DOCTYPE html>
<html lang="ua">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link href="
https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css
" rel="stylesheet">
  <title>PR2</title>
</head>

<body>
  <div class="container mt-5">
    <div class="vstack gap-3 text-center">

      <div class="shadow-sm  bg-light rounded p-2">
        <h2><b>💨 Вітрова електростанція</b></h2>
        <p>Востаннє оновлено: <b><span id="LASTU">-</span></b></p>
      </div>

      <div class="container">
        <div class=" row gap-2">
          <div class="col-sm p-4 shadow-sm bg-light rounded">

            <div class=" align-items-center btn-group gap-2 ">
              <a onclick="update()" class="btn btn-primary" id="UPDATE" aria-current="page"> <i
                  class="bi bi-arrow-clockwise"></i> Оновити</a>
              <p class="m-0">Час роботи:<br><b><span id="TIME">00:00:00</span></b></p>
              <a onclick="playstop()" class="btn btn-primary " id="PLAYSTOP"><i class="bi bi-play-fill"></i> Почати</a>

            </div>
            <b>
              <p class="mb-0" id="status5">Стан стабільний</p>
            </b>
            <hr class="my-4">
            <div>
              <h5 class="text-muted mb-2">Напрямок вітру</h5>
              <div class="d-flex justify-content-center align-items-baseline gap-1">
                <h3 class="fw-bold mb-0" id="number5">0</h3>
                <h3 class="text-muted mb-0">°</h3>
                <i id="wind-angle" class="bi bi-arrow-up wind-angle"></i>
              </div>
            </div>
          </div>
          <div class="col-sm p-4 shadow-sm bg-light rounded">
            <canvas id="powerChart"></canvas>
          </div>
        </div>
      </div>

      <div class="container">
        <div class=" row gap-2">
          <div class="col-sm p-4 shadow-sm bg-light rounded">
            <h5 class="text-muted mb-2">Швидкість вітру</h5>
            <div class="d-flex justify-content-center align-items-baseline gap-1">
              <h3 class="fw-bold mb-0" id="number1">0</h3>
              <p class="text-muted mb-0">м/с</p>
            </div>
            <i id="status1" class="bi bi-circle-fill" style="font-size: 0.9rem; transition: 0.3s;"></i>
          </div>
          <div class="col-sm p-4 shadow-sm bg-light rounded">
            <h5 class="text-muted mb-2">Обертання ротора</h5>
            <div class="d-flex justify-content-center align-items-baseline gap-1">
              <h3 class="fw-bold mb-0" id="number2">0</h3>
              <p class="text-muted mb-0">об/хв</p>
            </div>
            <i id="status2" class="bi bi-circle-fill" style="font-size: 0.9rem; transition: 0.3s;"></i>
          </div>
          <div class="col-sm p-4 shadow-sm bg-light rounded">
            <h5 class="text-muted mb-2">Вироблена потужність</h5>
            <div class="d-flex justify-content-center align-items-baseline gap-1">
              <h3 class="fw-bold mb-0" id="number3">0</h3>
              <p class="text-muted mb-0">кВт</p>
            </div>
            <i id="status3" class="bi bi-circle-fill" style="font-size: 0.9rem; transition: 0.3s;"></i>
          </div>
          <div class="col-sm p-4 shadow-sm bg-light rounded">
            <h5 class="text-muted mb-2">Кут нахилу лопатей</h5>
            <div class="d-flex justify-content-center align-items-baseline gap-1">
              <h3 class="fw-bold mb-0 " id="number4">0</h3>
              <h3 class="text-muted mb-0">°</h3>
            </div>
            <i id="status4" class="bi bi-circle-fill" style="font-size: 0.9rem; transition: 0.3s;"></i>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script src="script.js"></script>
</body>

</html>
